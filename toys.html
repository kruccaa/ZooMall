<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Montserrat:wght@900&family=Sniglet:wght@400;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="backfon">
    <div class="menu-overlay" id="menuOverlay">
        <!-- Close button (Хрестик) -->
        <div id="closeMenuBtn">
            <div class="close-btn"></div>
        </div>
        
        <!-- Неоновий надпис зверху -->
        <div class="neon-slogan">With love for pets ♡</div>
    </div>

    <a href="index.html#menu" class="back-arrow">
        <img src="arrow.jpg" alt="Back">
    </a>
    
    <div class="cart-icon-wrapper toys-cart-icon" id="cartIconBtn">
        <svg class="cart-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        <span class="cart-badge" id="cartBadge">0</span>
    </div>
    <h1 class="toys-title">Каталог іграшок</h1>
    
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Пошук іграшок за назвою...">
    </div>

    <div class="cards-toys"></div>
  <script src="script.js"></script>
  </body>
</html>
